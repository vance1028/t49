services:
  db:
    image: mysql:8.0
    container_name: mealcare-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: mealcare
      MYSQL_USER: meal
      MYSQL_PASSWORD: mealpass
    ports:
      - "13326:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    container_name: mealcare-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4920
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: meal
      DB_PASSWORD: mealpass
      DB_NAME: mealcare
    ports:
      - "4920:4920"

volumes:
  db_data:
